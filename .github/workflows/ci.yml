name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PyGithub>=2.1" ruff pytest

      - name: Lint (ruff)
        run: ruff check orchestrator tests

      - name: Tests (pytest)
        run: python -m pytest
